services:
  db:
    image: postgres
    container_name: postgres_db
    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_NAME: ${POSTGRES_NAME}
      POSTGRES_DB_URL: ${POSTGRES_DB_URL}

    ports:
      - 5132:5432

    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
